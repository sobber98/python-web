name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest

      - name: Compile Python files
        run: python -m compileall app tests

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository_owner }}/python-management-platform:${{ github.sha }} -t ghcr.io/${{ github.repository_owner }}/python-management-platform:latest .

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to GitHub Packages
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/python-management-platform:${{ github.sha }} && docker push ghcr.io/${{ github.repository_owner }}/python-management-platform:latest
